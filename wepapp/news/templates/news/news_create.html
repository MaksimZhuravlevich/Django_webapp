{% extends 'main/layout.html' %}

{% block title %}Добавление Газеты{% endblock %}

{% block content %}
    <div class="features">
        <h1>Добавление статьи</h1>
        <form method="post" >
            {% csrf_token %}
            {{ form.name }}<br>
            {{ form.information }}<br>

            <span>{{ error }}</span>

            <button class="btn btn-success" type="submit">Добавить статью</button>

        </form>
    </div>
{% endblock %}
